- mcu: ESP32-P4
  devices:
  - name: M5Tab5
    description: M5Stack Tab5
    sku: SKU:C145/K145
    eol: SALE
    image: https://m5stack-doc.oss-cn-shenzhen.aliyuncs.com/1132/C145_02.webp
    docs: https://docs.m5stack.com/zh_CN/core/Tab5
    variants:
    - name: ST7123
      identify_i2c:
      - port: 0
        sda: 29
        scl: 30
        freq: 400000
        addr: 85
      display:
      - driver: st7123
        width: 1280
        height: 720
        freq: 0
        pins: {}
      touch:
      - driver: st7123
        addr: 85
        width: 0
        height: 0
        pins:
          sda: 31
          scl: 32
          int: 23
          rst: PI4IOE5V6408(0x43) Bit5
    - name: IlI9881c
      identify_i2c:
      - port: 0
        sda: 29
        scl: 30
        freq: 400000
        addr: 20
      display:
      - driver: ili9881c
        width: 1280
        height: 720
        freq: 0
        pins: {}
      touch:
      - driver: gt911
        addr: 20
        width: 0
        height: 0
        pins:
          sda: 31
          scl: 32
          int: 23
          rst: PI4IOE5V6408(0x43) Bit5
    check_pins:
      2:
        mode: input
        expect: 1
      1:
        mode: input
        expect: 0
    i2c_internal:
    - port: 0
      sda: 29
      scl: 30
      freq: 400000
      detect:
      - name: PI4IOE5V6408_1
        addr: 67
      - name: PI4IOE5V6408_2
        addr: 68
    display: []
    touch: []
