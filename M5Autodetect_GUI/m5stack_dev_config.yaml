mcu_categories:
- mcu: ESP32-S3
  devices:
  - name: M5AtomS3R
    description: AtomS3R with ESP32-S3-PICO-1
    sku: SKU:C126
    eol: SALE
    image: https://static-cdn.m5stack.com/resource/docs/products/core/AtomS3R/3.webp
    docs: https://docs.m5stack.com/zh_CN/core/AtomS3R
    variants: []
    check_pins:
      45:
        mode: input
        expect: 1
      0:
        mode: input
        expect: 1
    i2c_internal:
    - port: 0
      sda: 45
      scl: 0
      freq: 400000
      detect:
      - name: BMI270
        addr: 104
      - name: LP5562
        addr: 48
    display:
    - driver: gc9107
      width: 128
      height: 128
      freq: 40000000
      pins:
        bl: I2C(45,0)@0x30
        cs: 14
        dc: 42
        mosi: 21
        rst: 48
        sclk: 15
      identify:
        cmd: 4
        expect: 9504767
        mask: 16777215
        rst_before: true
        rst_wait: 120
    touch: []
  - name: M5AtomEchoS3R
    description: Atom EchoS3R with ESP32-S3-PICO-1
    sku: SKU:C126-ECHO
    eol: SALE
    image: https://m5stack-doc.oss-cn-shenzhen.aliyuncs.com/1182/Atom_EchoS3R_02.webp
    docs: https://docs.m5stack.com/en/core/Atom_EchoS3R
    check_pins:
      45:
        mode: input
        expect: 1
      0:
        mode: input
        expect: 1
    i2c_internal:
    - port: 0
      sda: 45
      scl: 0
      freq: 400000
      detect:
      - name: ES8311
        addr: 24
    variants: []
    display: []
    touch: []
  - name: M5AtomS3
    description: AtomS3 with ESP32-S3
    sku: SKU:C123
    eol: SALE
    image: https://static-cdn.m5stack.com/resource/docs/products/core/AtomS3/3.webp
    docs: https://docs.m5stack.com/zh_CN/core/AtomS3
    variants: []
    check_pins:
      38:
        mode: input
        expect: 1
      39:
        mode: input
        expect: 1
    i2c_internal:
    - port: 0
      sda: 38
      scl: 39
      freq: 400000
      detect:
      - name: MPU6886
        addr: 104
    display:
    - driver: gc9107
      freq: 40000000
      height: 128
      pins:
        bl: 16
        cs: 15
        dc: 33
        mosi: 21
        rst: 34
        sclk: 17
      width: 128
      identify:
        cmd: 4
        expect: 9504767
        mask: 16777215
        rst_before: true
        rst_wait: 120
    touch: []
  - name: M5AtomS3Lite
    description: AtomS3 Lite with ESP32-S3
    sku: SKU:C124
    eol: SALE
    image: https://static-cdn.m5stack.com/resource/docs/products/core/AtomS3%20Lite/img-ae1b2014-3c47-4f9f-8506-c6ec0667ac09.webp
    docs: https://docs.m5stack.com/zh_CN/core/AtomS3%20Lite
    variants: []
    check_pins:
      38:
        mode: input
        expect: 1
      39:
        mode: input
        expect: 1
    i2c_internal:
    - port: 0
      sda: 38
      scl: 39
      freq: 400000
      detect: []
    display: []
